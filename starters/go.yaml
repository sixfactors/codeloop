# Codeloop Configuration
# Go starter

project:
  name: "my-project"

scopes:
  backend:
    paths: ["cmd/**", "internal/**", "pkg/**"]
    gotcha_sections: ["Backend", "Database", "API"]
    pattern_sections: ["Backend", "API"]
  tests:
    paths: ["**/*_test.go"]
    gotcha_sections: ["Testing"]
    pattern_sections: ["Testing"]
  config:
    paths: [".github/**", "Dockerfile*", "docker-compose*", "Makefile"]
    gotcha_sections: ["CI", "Config"]
    pattern_sections: ["CI"]

quality_checks:
  backend:
    - name: "Vet"
      command: "go vet ./... 2>&1 | tail -20"
    - name: "Build"
      command: "go build ./... 2>&1 | tail -20"

diff_scan:
  - pattern: "fmt\\.Print"
    files: "*.go"
    exclude: "*_test.go"
    severity: WARNING
    message: "fmt.Print in production code — use structured logging"
  - pattern: "panic\\("
    files: "*.go"
    exclude: "*_test.go"
    severity: WARNING
    message: "panic() in production code — return errors instead"

# Testing — used by /test and /qa
test:
  command: "go test ./..."
  coverage_threshold: 70
  integrity_checks: false

# Deployment — used by /deploy and /ship
# Uncomment and fill in your deploy commands:
# deploy:
#   staging:
#     command: "make deploy-staging"
#     verify: "curl -sf https://staging.example.com/health"
#   production:
#     command: "make deploy-prod"
#     verify: "curl -sf https://example.com/health"
#     requires: staging

# Debugging — used by /debug
# Uncomment and fill in your log/health commands:
# debug:
#   logs: "kubectl logs deployment/myapp --tail=50"
#   health: "curl -sf https://example.com/health"

commit:
  types: [feat, fix, refactor, docs, test, chore, perf]
  format: "type(scope): message"

# Watch mode — used by `codeloop watch`
watch:
  enabled: true
  idle_timeout: 300
  signals:
    file_change: true
    git_commit: true
    test_result: true
    build_status: true
    idle: true
  ignore:
    - vendor
    - bin
    - .git
    - "*.log"

codeloop:
  critical_frequency: 3
  promote_frequency: 10
  max_knowledge_lines: 200
