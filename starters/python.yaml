# Codeloop Configuration
# Python starter

project:
  name: "my-project"

scopes:
  backend:
    paths: ["src/**", "app/**", "lib/**"]
    gotcha_sections: ["Backend", "Database", "API"]
    pattern_sections: ["Backend", "API"]
  tests:
    paths: ["tests/**", "**/*_test.py", "**/test_*.py"]
    gotcha_sections: ["Testing"]
    pattern_sections: ["Testing"]
  config:
    paths: [".github/**", "Dockerfile*", "docker-compose*", "pyproject.toml", "setup.py"]
    gotcha_sections: ["CI", "Config"]
    pattern_sections: ["CI"]

quality_checks:
  backend:
    - name: "Type check"
      command: "mypy src/ 2>&1 | tail -20"
    - name: "Lint"
      command: "ruff check src/ 2>&1 | tail -20"

diff_scan:
  - pattern: "print\\("
    files: "*.py"
    exclude: "test_*,*_test.py,conftest.py"
    severity: WARNING
    message: "print() in production code — use logging"
  - pattern: "import pdb"
    files: "*.py"
    severity: CRITICAL
    message: "Debugger import left in code"
  - pattern: "\\.env"
    files: "*"
    severity: CRITICAL
    message: ".env file should not be committed"

# Testing — used by /test and /qa
test:
  command: "pytest"
  coverage_threshold: 80
  integrity_checks: true

# Deployment — used by /deploy and /ship
# Uncomment and fill in your deploy commands:
# deploy:
#   staging:
#     command: "make deploy-staging"
#     verify: "curl -sf https://staging.example.com/health"
#   production:
#     command: "make deploy-prod"
#     verify: "curl -sf https://example.com/health"
#     requires: staging

# Debugging — used by /debug
# Uncomment and fill in your log/health commands:
# debug:
#   logs: "journalctl -u myapp --no-pager -n 50"
#   health: "curl -sf https://example.com/health"

commit:
  types: [feat, fix, refactor, docs, test, chore, perf]
  format: "type(scope): message"

# Watch mode — used by `codeloop watch`
watch:
  enabled: true
  idle_timeout: 300
  signals:
    file_change: true
    git_commit: true
    test_result: true
    build_status: true
    idle: true
  ignore:
    - __pycache__
    - .venv
    - venv
    - dist
    - .git
    - "*.log"
    - "*.pyc"

codeloop:
  critical_frequency: 3
  promote_frequency: 10
  max_knowledge_lines: 200
