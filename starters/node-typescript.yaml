# Codeloop Configuration
# Node.js + TypeScript starter

project:
  name: "my-project"

scopes:
  backend:
    paths: ["src/**", "lib/**"]
    gotcha_sections: ["Backend", "Database", "API"]
    pattern_sections: ["Backend", "API", "Error Handling"]
  frontend:
    paths: ["app/**", "components/**", "pages/**"]
    gotcha_sections: ["Frontend", "React"]
    pattern_sections: ["Frontend", "Components"]
  tests:
    paths: ["**/*.test.*", "**/*.spec.*", "__tests__/**"]
    gotcha_sections: ["Testing"]
    pattern_sections: ["Testing"]
  config:
    paths: [".github/**", "Dockerfile*", "docker-compose*", "*.config.*"]
    gotcha_sections: ["CI", "Config"]
    pattern_sections: ["CI"]

quality_checks:
  backend:
    - name: "Typecheck"
      command: "npx tsc --noEmit 2>&1 | tail -20"
  frontend:
    - name: "Typecheck"
      command: "npx tsc --noEmit 2>&1 | tail -20"

diff_scan:
  - pattern: "console\\.log"
    files: "*.ts,*.tsx,*.js,*.jsx"
    exclude: "*.test.*,*.spec.*"
    severity: CRITICAL
    message: "console.log in production code"
  - pattern: "\\.env"
    files: "*"
    severity: CRITICAL
    message: ".env file should not be committed"
  - pattern: "any\\b"
    files: "*.ts,*.tsx"
    exclude: "*.test.*,*.spec.*,*.d.ts"
    severity: WARNING
    message: "Explicit 'any' type — consider a specific type"

# Testing — used by /test and /qa
test:
  command: "npm test"
  coverage_threshold: 80
  integrity_checks: true

# Deployment — used by /deploy and /ship
# Uncomment and fill in your deploy commands:
# deploy:
#   staging:
#     command: "make deploy-staging"    # or "vercel --env preview"
#     verify: "curl -sf https://staging.example.com/health"
#   production:
#     command: "make deploy-prod"       # or "vercel --prod"
#     verify: "curl -sf https://example.com/health"
#     requires: staging

# Debugging — used by /debug
# Uncomment and fill in your log/health commands:
# debug:
#   logs: "fly logs --app myapp"       # or "vercel logs"
#   health: "curl -sf https://example.com/health"

commit:
  types: [feat, fix, refactor, docs, test, chore, perf]
  format: "type(scope): message"

# Watch mode — used by `codeloop watch`
watch:
  enabled: true
  idle_timeout: 300
  signals:
    file_change: true
    git_commit: true
    test_result: true
    build_status: true
    idle: true
  ignore:
    - node_modules
    - dist
    - .git
    - "*.log"

codeloop:
  critical_frequency: 3
  promote_frequency: 10
  max_knowledge_lines: 200
